<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO 101 CBT Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --primary-light: #dcfce7;
            --bg: #f0fdf4;
            --card-bg: #ffffff;
            --text: #14532d;
            --text-muted: #4b7a5f;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #f59e0b;
            --border: rgba(22,163,74,0.15);
            --share-gradient: linear-gradient(135deg, #14532d 0%, #16a34a 55%, #84cc16 100%);
            --nav-h: 64px;
        }
        .dark-mode {
            --bg: #0a1f0f;
            --card-bg: #0f2d18;
            --text: #dcfce7;
            --text-muted: #86efac;
            --border: rgba(134,239,172,0.12);
            --primary-light: rgba(22,163,74,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* Subtle grid bg */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background-image:
                linear-gradient(rgba(22,163,74,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(22,163,74,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* ── NAV ── */
        nav {
            background: var(--card-bg);
            height: var(--nav-h);
            padding: 0 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 24px rgba(22,163,74,0.08);
        }
        .nav-brand {
            display: flex; flex-direction: column; gap: 1px;
        }
        .nav-brand-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--primary);
            letter-spacing: -0.3px;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-brand-title .leaf { font-size: 1.1rem; }
        .nav-brand-sub {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .nav-actions { display: flex; gap: 10px; align-items: center; }

        main { padding: 2rem 5%; max-width: 980px; margin: 0 auto; }

        /* ── STATS BAR ── */
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.8rem; margin-bottom: 1.8rem;
        }
        .stat-card {
            background: var(--card-bg); border-radius: 14px; padding: 1rem 1.2rem;
            text-align: center;
            border: 1.5px solid var(--border);
            box-shadow: 0 2px 8px rgba(22,163,74,0.06);
            position: relative; overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
            background: var(--share-gradient);
        }
        .stat-card .stat-val { font-family: 'Syne', sans-serif; font-size: 1.7rem; font-weight: 800; color: var(--primary); }
        .stat-card .stat-lbl { font-size: 0.73rem; color: var(--text-muted); margin-top: 3px; font-weight: 500; letter-spacing: 0.3px; }

        /* ── DASHBOARD HEADER ── */
        .dash-header {
            margin-bottom: 1.5rem;
            display: flex; align-items: flex-end; justify-content: space-between;
            flex-wrap: wrap; gap: 10px;
        }
        .dash-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--text); }
        .dash-count { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(22,163,74,0.2);
        }

        /* ── DASHBOARD GRID ── */
        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 1rem; }
        .box {
            background: var(--card-bg); padding: 1.6rem 1.2rem; border-radius: 16px;
            text-align: center; cursor: pointer;
            transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s, border-color 0.25s;
            border: 1.5px solid var(--border);
            box-shadow: 0 2px 10px rgba(22,163,74,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
        }
        .box:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: var(--primary);
            box-shadow: 0 12px 28px rgba(22,163,74,0.18);
        }
        .box-icon { font-size: 2rem; line-height: 1; }
        .box h3 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); }
        .box p { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; }
        .box-random {
            background: var(--share-gradient) !important;
            color: white !important; border: none !important;
        }
        .box-random h3, .box-random p { color: rgba(255,255,255,0.95) !important; }
        .box-random p { color: rgba(255,255,255,0.75) !important; }

        /* ── SETUP SCREEN ── */
        #setup-screen {
            background: var(--card-bg); padding: 3rem 2.5rem; border-radius: 20px;
            border: 1.5px solid var(--border);
            box-shadow: 0 8px 32px rgba(22,163,74,0.08);
            max-width: 500px; margin: 0 auto;
        }
        #setup-screen h2 {
            font-family: 'Syne', sans-serif; font-size: 1.4rem;
            color: var(--primary); margin-bottom: 2rem; text-align: center;
        }
        .setup-group { margin-bottom: 1.5rem; }
        .setup-group label { font-weight: 600; font-size: 0.85rem; color: var(--text); display: block; margin-bottom: 7px; letter-spacing: 0.3px; }
        .setup-input {
            width: 100%; padding: 11px 14px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 0.95rem;
            background: var(--bg); color: var(--text); outline: none;
            transition: border-color 0.2s; font-family: 'DM Sans', sans-serif;
        }
        .setup-input:focus { border-color: var(--primary); }
        .checkbox-group {
            display: flex; flex-direction: column; gap: 12px;
            background: var(--bg); padding: 14px; border-radius: 10px;
            border: 1.5px solid var(--border);
        }
        .custom-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text); font-weight: 500; user-select: none; }
        .custom-checkbox input { width: 17px; height: 17px; accent-color: var(--primary); cursor: pointer; }

        /* ── QUIZ INTERFACE ── */
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
        }
        .q-counter {
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text);
        }
        .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        #timer {
            color: var(--danger); background: rgba(220,38,38,0.09);
            padding: 6px 16px; border-radius: 20px; font-size: 0.9rem;
            font-weight: 700; font-family: 'Syne', sans-serif;
            border: 1px solid rgba(220,38,38,0.15);
        }

        /* Progress bar */
        .progress-wrap { height: 5px; background: var(--border); border-radius: 99px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--share-gradient); border-radius: 99px; transition: width 0.4s ease; }

        .question-card {
            background: var(--card-bg); padding: 2.2rem; border-radius: 18px;
            box-shadow: 0 4px 24px rgba(22,163,74,0.07);
            border: 1.5px solid var(--border);
        }
        #question-text {
            line-height: 1.75; margin-bottom: 1.6rem; font-size: 1.05rem;
            color: var(--text); font-weight: 400;
        }

        .option-btn {
            display: block; width: 100%; padding: 1rem 1.2rem;
            margin: 0.6rem 0;
            border: 2px solid var(--border); border-radius: 12px;
            background: var(--bg); color: var(--text); text-align: left;
            cursor: pointer; font-size: 0.95rem;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
            line-height: 1.5; font-family: 'DM Sans', sans-serif;
        }
        .option-btn:not(:disabled):hover { background: var(--primary-light); border-color: var(--primary); transform: translateX(4px); }
        .option-btn.selected { background: #e0f2fe !important; border-color: #3b82f6 !important; color: #0369a1 !important; }
        .option-btn.correct  { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: 700; }
        .option-btn.wrong    { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .feedback-msg { margin-top: 1.2rem; padding: 1.2rem 1.4rem; border-radius: 12px; font-weight: 600; animation: fadeIn 0.3s; line-height: 1.6; font-size: 0.95rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 2rem; }
        .btn {
            padding: 0.8rem 1.6rem; border: none; border-radius: 10px; cursor: pointer;
            font-weight: 700; background: var(--primary); color: white;
            transition: opacity 0.2s, transform 0.2s;
            font-size: 0.92rem; font-family: 'Syne', sans-serif;
            letter-spacing: 0.2px;
        }
        .btn:hover { opacity: 0.88; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── RESULT MODAL ── */
        .result-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px); z-index: 9999;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .result-modal-content {
            background: var(--card-bg); padding: 44px 32px; border-radius: 28px;
            width: 100%; max-width: 430px; text-align: center; color: var(--text);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            border: 2px solid var(--border);
            animation: bounceIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0%   { opacity: 0; transform: scale(0.75) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .result-icon { font-size: 3.8rem; margin-bottom: 8px; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .score-display {
            background: var(--primary-light);
            border: 2px dashed rgba(22,163,74,0.3); border-radius: 20px;
            padding: 20px; margin: 18px 0;
        }
        .score-big { font-family: 'Syne', sans-serif; font-size: 3.8rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .stats-mini { display: flex; justify-content: center; gap: 28px; margin: 12px 0 4px; }
        .stats-mini .sm { text-align: center; }
        .stats-mini .sm .sv { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--primary); }
        .stats-mini .sm .sl { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
        #save-status { font-size: 0.78rem; color: var(--text-muted); margin: 8px 0 14px; }
        .result-actions { display: flex; flex-direction: column; gap: 11px; }
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 13px; font-size: 0.97rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 9px; font-family: 'Syne', sans-serif; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-share  { background: var(--share-gradient); color: white; box-shadow: 0 4px 20px rgba(22,163,74,0.35); }
        .btn-review { background: var(--primary-light); color: var(--primary); border: 1.5px solid rgba(22,163,74,0.25); }
        .btn-home   { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            #dashboard { grid-template-columns: repeat(2, 1fr); }
            .question-card { padding: 1.4rem; }
            .result-modal-content { padding: 30px 18px; }
            .score-big { font-size: 3rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            #setup-screen { padding: 2rem 1.2rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <div class="nav-brand-title">
            <span class="leaf">🌿</span> BIO 101 Practice Portal
        </div>
        <div class="nav-brand-sub">by Resolute Femi</div>
    </div>
    <div class="nav-actions">
        <button class="btn" style="background:var(--accent); display:none; padding:7px 14px; font-size:0.82rem;" id="resume-btn" onclick="resumeExam()">
            <i class="fa-solid fa-rotate-right"></i> Resume
        </button>
        <button class="btn" style="background:#4b7a5f; padding:7px 14px; font-size:0.82rem;" onclick="document.body.classList.toggle('dark-mode')">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</nav>

<main>
    <!-- DASHBOARD -->
    <div id="dashboard-wrap">
        <div id="stats-bar" class="stats-bar" style="display:none;"></div>
        <div class="dash-header">
            <div>
                <div class="dash-title">BIO 101 Question Bank</div>
                <div class="dash-count" id="dash-count"></div>
            </div>
            <span class="badge" id="total-badge"></span>
        </div>
        <div id="dashboard"></div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" style="display:none;">
        <h2 id="setup-title"></h2>

        <div class="setup-group">
            <label>Select Mode:</label>
            <select id="quiz-mode" class="setup-input">
                <option value="practice">Practice Mode (Instant Answers)</option>
                <option value="exam">Exam Mode (Answers at End)</option>
            </select>
        </div>

        <div id="random-settings">
            <div class="setup-group">
                <label>Question Quantity:</label>
                <input type="number" id="q-count" value="50" class="setup-input" min="1" max="999">
            </div>
        </div>

        <div class="setup-group">
            <label>Time Limit (Minutes):</label>
            <input type="number" id="t-limit" value="30" class="setup-input" min="1">
        </div>

        <div class="setup-group">
            <div class="checkbox-group">
                <label class="custom-checkbox">
                    <input type="checkbox" id="shuffle-questions" checked> Shuffle Questions
                </label>
                <label class="custom-checkbox">
                    <input type="checkbox" id="shuffle-options" checked> Shuffle Options (A, B, C, D)
                </label>
            </div>
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:2rem;">
            <button class="btn" style="background:#4b7a5f;" onclick="goHome()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button class="btn" onclick="startExam()" style="min-width:160px;">
                Start Now <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- QUIZ INTERFACE -->
    <div id="quiz-interface" style="display:none;">
        <div class="quiz-header">
            <span class="q-counter">Question <span id="cur-idx">1</span> / <span id="total-idx">0</span></span>
            <div class="btn-group">
                <button class="btn" id="submit-btn" style="background:var(--success); display:none; padding:8px 15px; font-size:0.85rem;" onclick="showResults()">
                    <i class="fa-solid fa-paper-plane"></i> Submit
                </button>
                <button class="btn" id="finish-review-btn" style="display:none; padding:8px 15px; font-size:0.85rem;" onclick="goHome()">
                    <i class="fa-solid fa-house"></i> Exit Review
                </button>
                <span id="timer">30:00</span>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>

        <div class="question-card">
            <h3 id="question-text"></h3>
            <div id="options-box"></div>
            <div id="feedback-area"></div>
        </div>

        <div class="controls">
            <button class="btn" style="background:#4b7a5f;" onclick="move(-1)">
                <i class="fa-solid fa-arrow-left"></i> Previous
            </button>
            <button class="btn" id="next-btn" onclick="move(1)">
                Next <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>
</main>

<!-- RESULT MODAL -->
<div id="quizResultModal" class="result-modal-overlay" style="display:none;">
    <div class="result-modal-content">
        <span class="result-icon" id="resultIcon">🏆</span>
        <h2 id="resultGreeting" style="margin:0 0 14px; font-family:'Syne',sans-serif; font-size:1.5rem;">Outstanding!</h2>

        <div class="score-display">
            <div class="score-big"><span id="finalScoreText">0</span>%</div>
            <div class="stats-mini">
                <div class="sm"><div class="sv" id="modalCorrect">0</div><div class="sl">Correct</div></div>
                <div class="sm"><div class="sv" id="modalTotal">0</div><div class="sl">Total</div></div>
                <div class="sm"><div class="sv" id="modalAvg">—</div><div class="sl">Your Avg</div></div>
            </div>
        </div>

        <p id="resultFeedback" style="font-size:0.9rem; color:var(--text-muted); margin:0;"></p>
        <p id="save-status"></p>

        <div class="result-actions" style="margin-top:18px;">
            <button class="btn-action btn-share" onclick="shareQuizResult()">
                <i class="fa-solid fa-share-nodes"></i> Share Score
            </button>
            <button class="btn-action btn-review" id="modalReviewBtn" onclick="enterReviewMode()">
                <i class="fa-solid fa-magnifying-glass"></i> Review Answers
            </button>
            <button class="btn-action btn-home" onclick="goHome()">
                <i class="fa-solid fa-house"></i> Dashboard
            </button>
        </div>
    </div>
</div>

<script>
    const COURSE_CODE = 'BIO 101';

    const MASTER_POOL = [
  {
    "question": "Animals must eat other organisms for food, so they are classified as ___.",
    "options": ["Heterotrophs", "Autotrophs", "Eukaryotic", "Prokaryotic"],
    "answer": "Heterotrophs",
    "explanation": "Animals cannot make their own food and must consume other organisms, making them heterotrophs."
  },
  {
    "question": "Tigers, Jellyfish, Gorillas and Sponges are all _______.",
    "options": ["Animals", "Plants", "Fungi", "Bacteria"],
    "answer": "Animals",
    "explanation": "All four organisms belong to Kingdom Animalia as they are all multicellular, heterotrophic, and lack cell walls."
  },
  {
    "question": "What kingdom is always multicellular, heterotrophic and has NO cell wall?",
    "options": ["Protista", "Fungi", "Plantae", "Animalia"],
    "answer": "Animalia",
    "explanation": "Kingdom Animalia consists of multicellular organisms that are heterotrophic and have no cell wall, only a plasma membrane."
  },
  {
    "question": "All of the following have a nucleus EXCEPT...",
    "options": ["Bacteria", "Animalia", "Plantae", "Protista"],
    "answer": "Bacteria",
    "explanation": "Bacteria are prokaryotes and lack a membrane-bound nucleus. All others (Animalia, Plantae, Protista) are eukaryotes."
  },
  {
    "question": "You would find mushrooms in which group?",
    "options": ["Plants", "Protists", "Fungi", "Animals"],
    "answer": "Fungi",
    "explanation": "Mushrooms are the fruiting bodies of organisms belonging to Kingdom Fungi."
  },
  {
    "question": "This kingdom contains heterotrophic organisms that can be unicellular or multicellular. Organisms from this kingdom can be used to make bread, or sometimes cause athlete's foot or ringworm.",
    "options": ["Fungi", "Animals", "Protists", "Archaebacteria"],
    "answer": "Fungi",
    "explanation": "Fungi are heterotrophs used in baking (yeast) and can also be pathogenic, causing conditions like athlete's foot (Tinea pedis)."
  },
  {
    "question": "Which kingdom do humans belong to?",
    "options": ["Plants", "Fungi", "Animals", "Protists"],
    "answer": "Animals",
    "explanation": "Humans (Homo sapiens) belong to Kingdom Animalia under phylum Chordata, class Mammalia."
  },
  {
    "question": "This group contains all organisms that have a true nucleus in each of their cells.",
    "options": ["Animals", "Plants", "Bacteria", "Eukarya"],
    "answer": "Eukarya",
    "explanation": "Domain Eukarya includes all organisms whose cells have a membrane-bound nucleus."
  },
  {
    "question": "Organisms that are classified as unicellular are ___.",
    "options": ["Seen with the naked eye", "Many-celled organisms", "Single-celled organisms", "Able to make their own food"],
    "answer": "Single-celled organisms",
    "explanation": "Unicellular means the entire organism consists of a single cell."
  },
  {
    "question": "Which group contains organisms that are unicellular, prokaryotic, and can cause strep throat or E. coli infections?",
    "options": ["Eukarya", "Plants", "Fungi", "Bacteria"],
    "answer": "Bacteria",
    "explanation": "Streptococcus (strep throat) and Escherichia coli are both unicellular prokaryotes in domain Bacteria."
  },
  {
    "question": "Sexual reproduction requires ______ parents.",
    "options": ["0", "1", "2", "3"],
    "answer": "2",
    "explanation": "Sexual reproduction involves the fusion of gametes from two parents (one providing sperm, one providing egg)."
  },
  {
    "question": "What type of organism makes its own food internally?",
    "options": ["Heterotroph", "Autotroph", "Carnivore", "Omnivore"],
    "answer": "Autotroph",
    "explanation": "Autotrophs (producers) synthesize their own organic molecules from inorganic sources using light or chemical energy."
  },
  {
    "question": "Cells that do NOT have a true nucleus are called...",
    "options": ["Eukaryote", "Prokaryote", "Unicellular", "Multicellular"],
    "answer": "Prokaryote",

    /* ══════════════
       STATE VARS
    ══════════════ */
    let currentExamData = [], userAnswers = {}, currentIndex = 0;
    let timeRemaining = 0, timerId = null;
    let activeMode = 'practice', isReviewMode = false;
    let examSelectionType = 'random', partNum = 1;

    /* ══════════════
       INIT
    ══════════════ */
    window.onload = () => {
        initDashboard();
        if (localStorage.getItem('saved_bio101_exam')) {
            document.getElementById('resume-btn').style.display = 'block';
        }
    };

    /* ── Dashboard ── */
    function initDashboard() {
        const board = document.getElementById('dashboard');
        board.innerHTML = '';
        const total = MASTER_POOL.length;
        const parts = Math.ceil(total / 50);

        document.getElementById('dash-count').textContent = `${total} questions across ${parts} parts`;
        document.getElementById('total-badge').textContent = `${total} Questions`;

        if (total === 0) {
            board.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);">No questions loaded.</p>`;
            return;
        }

        const rand = document.createElement('div');
        rand.className = 'box box-random';
        rand.innerHTML = `<div class="box-icon">🔀</div><h3>Random Mode</h3><p>${total} Questions</p>`;
        rand.onclick = () => openSetup('random', 0);
        board.appendChild(rand);

        for (let i = 1; i <= parts; i++) {
            const start = (i - 1) * 50 + 1;
            const end   = Math.min(i * 50, total);
            const card  = document.createElement('div');
            card.className = 'box';
            card.innerHTML = `
                <div class="box-icon" style="color:var(--primary);">🌿</div>
                <h3>Part ${i}</h3>
                <p>Q${start} – Q${end}</p>`;
            card.onclick = () => openSetup('part', i);
            board.appendChild(card);
        }
    }

    function openSetup(type, part) {
        examSelectionType = type;
        partNum = part;
        document.getElementById('dashboard-wrap').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('setup-title').innerText = type === 'random' ? '🔀 Randomised Practice' : `🌿 BIO 101 — Part ${part}`;
        document.getElementById('random-settings').style.display = type === 'random' ? 'block' : 'none';
    }

    function goHome() {
        clearInterval(timerId);
        isReviewMode = false;
        currentExamData = []; userAnswers = {}; currentIndex = 0;
        document.getElementById('quiz-interface').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quizResultModal').style.display = 'none';
        document.getElementById('dashboard-wrap').style.display = 'block';
    }

    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    /* ══════════════════
       START EXAM
    ══════════════════ */
    function startExam() {
        timeRemaining = parseInt(document.getElementById('t-limit').value) * 60;
        activeMode    = document.getElementById('quiz-mode').value;
        isReviewMode  = false;
        userAnswers   = {};
        currentIndex  = 0;

        let pool = JSON.parse(JSON.stringify(MASTER_POOL));

        if (examSelectionType === 'random') {
            const qty = Math.min(parseInt(document.getElementById('q-count').value), pool.length);
            pool = shuffleArray(pool).slice(0, qty);
        } else {
            const start = (partNum - 1) * 50;
            pool = pool.slice(start, start + 50);
        }

        if (document.getElementById('shuffle-questions').checked) pool = shuffleArray(pool);
        if (document.getElementById('shuffle-options').checked) {
            pool.forEach(q => { q.options = shuffleArray([...q.options]); });
        }

        currentExamData = pool;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-interface').style.display = 'block';
        document.getElementById('total-idx').innerText = currentExamData.length;
        runTimer();
        renderQuestion();
    }

    /* ══════════════════
       TIMER
    ══════════════════ */
    function runTimer() {
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeRemaining--;
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeRemaining <= 0) { clearInterval(timerId); showResults(true); }
        }, 1000);
    }

    /* ══════════════════
       RENDER QUESTION
    ══════════════════ */
    function renderQuestion() {
        const q          = currentExamData[currentIndex];
        const hasAnswered = userAnswers.hasOwnProperty(currentIndex);
        const userAns    = userAnswers[currentIndex];
        const labels     = ['A','B','C','D','E','F'];

        document.getElementById('cur-idx').innerText       = currentIndex + 1;
        document.getElementById('question-text').innerText = q.question;

        // Progress bar
        const pct = ((currentIndex + 1) / currentExamData.length) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';

        const optBox   = document.getElementById('options-box');
        const feedArea = document.getElementById('feedback-area');
        optBox.innerHTML  = '';
        feedArea.innerHTML = '';

        q.options.forEach((val, idx) => {
            const label = labels[idx] || (idx + 1);
            const btn   = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${label}.</strong> ${val}`;

            if (isReviewMode || (activeMode === 'practice' && hasAnswered)) {
                if (val === q.answer)    btn.classList.add('correct');
                else if (userAns === val) btn.classList.add('wrong');
                btn.disabled = true;
            } else if (activeMode === 'exam' && hasAnswered && userAns === val) {
                btn.classList.add('selected');
            }

            btn.onclick = () => {
                if (isReviewMode) return;
                if (activeMode === 'practice' && hasAnswered) return;
                userAnswers[currentIndex] = val;
                saveState();
                renderQuestion();
            };
            optBox.appendChild(btn);
        });

        const expHtml = q.explanation
            ? `<br><span style="font-weight:400;font-size:0.88rem;"><strong>Explanation:</strong> ${q.explanation}</span>`
            : '';

        if (isReviewMode) {
            if (hasAnswered) {
                const ok = userAns === q.answer;
                feedArea.innerHTML = `<div class="feedback-msg" style="background:${ok?'#dcfce7':'#fee2e2'};color:${ok?'#166534':'#991b1b'}">
                    ${ok ? '✔ Correct!' : '✘ Incorrect. Answer: <strong>' + q.answer + '</strong>'}${expHtml}</div>`;
            } else {
                feedArea.innerHTML = `<div class="feedback-msg" style="background:#fef9c3;color:#854d0e;border:1px solid #fde047;">
                    ⚠ Not answered. Correct: <strong>${q.answer}</strong>${expHtml}</div>`;
            }
        } else if (activeMode === 'practice' && hasAnswered) {
            const ok = userAns === q.answer;
            feedArea.innerHTML = `<div class="feedback-msg" style="background:${ok?'#dcfce7':'#fee2e2'};color:${ok?'#166534':'#991b1b'}">
                ${ok ? '✔ Correct!' : '✘ Incorrect. Answer: <strong>' + q.answer + '</strong>'}${expHtml}</div>`;
        }

        const isLast = currentIndex === currentExamData.length - 1;
        document.getElementById('next-btn').style.display          = isLast ? 'none' : 'block';
        document.getElementById('submit-btn').style.display        = isReviewMode ? 'none' : 'block';
        document.getElementById('finish-review-btn').style.display = isReviewMode ? 'block' : 'none';
    }

    function move(d) {
        const n = currentIndex + d;
        if (n >= 0 && n < currentExamData.length) { currentIndex = n; renderQuestion(); }
    }

    function saveState() {
        localStorage.setItem('saved_bio101_exam', JSON.stringify(
            { currentExamData, userAnswers, currentIndex, timeRemaining, activeMode, examSelectionType, partNum }
        ));
    }

    function resumeExam() {
        const s = JSON.parse(localStorage.getItem('saved_bio101_exam'));
        currentExamData   = s.currentExamData;
        userAnswers       = s.userAnswers;
        currentIndex      = s.currentIndex;
        timeRemaining     = s.timeRemaining;
        activeMode        = s.activeMode || 'practice';
        examSelectionType = s.examSelectionType || 'random';
        partNum           = s.partNum || 1;
        isReviewMode      = false;

        document.getElementById('dashboard-wrap').style.display = 'none';
        document.getElementById('resume-btn').style.display     = 'none';
        document.getElementById('quiz-interface').style.display = 'block';
        document.getElementById('total-idx').innerText          = currentExamData.length;
        runTimer();
        renderQuestion();
    }

    /* ══════════════════
       SHOW RESULTS
    ══════════════════ */
    async function showResults(forced = false) {
        const answered = Object.keys(userAnswers).length;
        if (!forced && answered < currentExamData.length) {
            if (!confirm(`You answered ${answered} of ${currentExamData.length}. Submit anyway?`)) return;
        }

        clearInterval(timerId);
        localStorage.removeItem('saved_bio101_exam');

        let score = 0;
        currentExamData.forEach((q, i) => { if (userAnswers[i] === q.answer) score++; });
        const total = currentExamData.length;
        const pct   = Math.round((score / total) * 100);

        document.getElementById('finalScoreText').innerText = pct;
        document.getElementById('modalCorrect').innerText   = score;
        document.getElementById('modalTotal').innerText     = total;
        document.getElementById('modalAvg').innerText       = '—';
        document.getElementById('modalReviewBtn').style.display = activeMode === 'practice' ? 'none' : 'flex';

        if (pct >= 70) {
            document.getElementById('resultIcon').innerText     = '🏆';
            document.getElementById('resultGreeting').innerText = 'Outstanding! 🌟';
            document.getElementById('resultFeedback').innerText = 'Excellent work! Keep it up!';
            confetti({ particleCount: 160, spread: 70, origin: { y: 0.6 }, colors: ['#16a34a','#84cc16','#f59e0b'] });
        } else if (pct >= 50) {
            document.getElementById('resultIcon').innerText     = '👍';
            document.getElementById('resultGreeting').innerText = 'Good Job!';
            document.getElementById('resultFeedback').innerText = 'Almost there — aim for 70%+!';
        } else {
            document.getElementById('resultIcon').innerText     = '💪';
            document.getElementById('resultGreeting').innerText = 'Keep Trying!';
            document.getElementById('resultFeedback').innerText = 'Review your notes and try again!';
        }

        document.getElementById('save-status').innerText = '';
        document.getElementById('quizResultModal').style.display = 'flex';
    }

    function enterReviewMode() {
        document.getElementById('quizResultModal').style.display = 'none';
        isReviewMode = true;
        currentIndex = 0;
        document.getElementById('timer').innerText         = 'REVIEW';
        document.getElementById('timer').style.background = 'var(--primary-light)';
        document.getElementById('timer').style.color      = 'var(--primary)';
        renderQuestion();
    }

    async function shareQuizResult() {
        const score   = document.getElementById('finalScoreText').innerText;
        const section = examSelectionType === 'random' ? 'a random mix' : `Part ${partNum}`;
        const text    = `I just scored ${score}% on ${COURSE_CODE} (${section})! 🌿\n\nChallenge yourself on the BIO 101 Practice Portal! 📚🔥`;
        try {
            if (navigator.share) await navigator.share({ title: `My ${COURSE_CODE} Score`, text });
            else { await navigator.clipboard.writeText(text); alert('Score copied to clipboard! 📋'); }
        } catch (_) {}
    }
</script>
</body>
</html>
