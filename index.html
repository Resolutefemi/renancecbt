<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENANCE — Create Account</title>
<link rel="shortcut icon" href="logo.png" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cabinet+Grotesk:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --b:#030712;--blue:#2563eb;--glow:#3b82f6;--cyan:#06b6d4;
  --ink:#f8fafc;--muted:rgba(148,163,184,.6);
  --card:rgba(8,12,22,.65);--border:rgba(59,130,246,.2);
}
html{height:100%;overflow:hidden}
body{height:100%;background:var(--b);font-family:'Cabinet Grotesk',sans-serif;color:var(--ink);overflow:hidden;cursor:none}

/* CURSOR (Hidden on mobile) */
#cur{position:fixed;width:8px;height:8px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 15px #fff, 0 0 30px var(--cyan)}
#cur-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(6,182,212,.6);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s}

/* CANVAS & GRAIN */
#c{position:fixed;inset:0;z-index:0}
.grain{position:fixed;inset:-200%;z-index:1;width:400%;height:400%;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:g .5s steps(1) infinite;pointer-events:none}
@keyframes g{0%{transform:translate(0,0)}20%{transform:translate(-5%,-10%)}40%{transform:translate(-15%,5%)}60%{transform:translate(7%,-25%)}80%{transform:translate(-5%,25%)}100%{transform:translate(0,0)}}

/* SCROLLABLE LAYOUT FOR TALL FORM */
.layout{position:relative;z-index:10;display:flex;justify-content:center;align-items:flex-start;height:100vh;padding:40px 20px;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.layout::-webkit-scrollbar{display:none}

/* CARD WITH PREMIUM GLASS & GLARE */
.card{position:relative;width:100%;max-width:440px;margin:auto;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:42px 36px 36px;backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);transform-style:preserve-3d;box-shadow:0 0 0 1px rgba(255,255,255,.05),0 30px 80px rgba(0,0,0,.9),0 0 60px rgba(6,182,212,.1);animation:slideUp 1s cubic-bezier(.16,1,.3,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(60px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Animated Border Sweep */
.card::before{content:'';position:absolute;inset:-1px;border-radius:25px;background:conic-gradient(from var(--a,0deg),transparent 60%,rgba(6,182,212,.8) 80%,rgba(59,130,246,.8) 100%);z-index:-1;animation:spin 3s linear infinite}
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes spin{to{--a:360deg}}
.card::after{content:'';position:absolute;inset:1px;border-radius:23px;background:linear-gradient(180deg, rgba(8,12,22,.8), rgba(8,12,22,.95));z-index:-1}

/* Interactive Glare */
.glare{position:absolute;inset:0;border-radius:24px;background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.08),transparent 40%);pointer-events:none;z-index:5;mix-blend-mode:overlay}

/* HEADER & GLITCH TEXT */
.flogo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px}
.gem{width:46px;height:46px;background:linear-gradient(135deg,#06b6d4,#3b82f6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#fff;box-shadow:0 0 20px rgba(6,182,212,.4), inset 0 2px 0 rgba(255,255,255,.2);position:relative}
.gem::after{content:'';position:absolute;inset:0;border-radius:14px;box-shadow:0 0 40px rgba(59,130,246,.6);animation:pulse 2s infinite alternate}
@keyframes pulse{from{opacity:.5}to{opacity:1}}
.lname{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.12em;line-height:1;background:linear-gradient(to right,#fff,#94a3b8);-webkit-background-clip:text;color:transparent}
.ltag{font-size:.65rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--cyan);display:block;margin-top:2px}

.ftitle{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.08em;line-height:1;margin-bottom:8px;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.2)}
.fsub{text-align:center;font-size:.85rem;font-weight:300;color:var(--muted);margin-bottom:24px}

/* FIELDS */
.f{margin-bottom:14px;position:relative;z-index:10}
.fl{font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(148,163,184,.5);display:flex;justify-content:space-between;margin-bottom:6px;padding-left:4px;transition:color .3s}
.f:focus-within .fl{color:var(--cyan)}

.iw{position:relative;display:flex;align-items:center}
.ic{position:absolute;left:16px;font-size:.85rem;color:rgba(148,163,184,.3);transition:color .3s,transform .3s;pointer-events:none}
.f:focus-within .ic{color:var(--cyan);transform:scale(1.1) translateY(-1px)}
.icr{position:absolute;right:16px;left:auto;cursor:pointer;pointer-events:all;padding:10px}
.icr:hover{color:#fff}

input,select{width:100%;height:46px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:0 42px;font-size:.9rem;font-family:'Cabinet Grotesk',sans-serif;color:var(--ink);outline:none;transition:all .3s ease;-webkit-appearance:none}
select{cursor:pointer}
select option{background:#070a12;color:#f8fafc}
input::placeholder{color:rgba(148,163,184,.25);font-weight:300}
input:focus,select:focus{border-color:rgba(6,182,212,.5);background:rgba(6,182,212,.05);box-shadow:0 0 0 4px rgba(6,182,212,.1), inset 0 0 15px rgba(6,182,212,.05)}

/* Signup specific input layout */
.pr{display:flex;gap:8px}
.cw{flex-shrink:0;position:relative}
.cw select{width:90px;padding:0 6px 0 12px;font-size:.8rem;pointer-events:none;color:var(--ink);background:rgba(0,0,0,.5)} 
.sw::after{content:'\f107';font-family:'Font Awesome 6 Free';font-weight:900;position:absolute;right:16px;top:50%;transform:translateY(-50%);color:rgba(148,163,184,.3);font-size:.7rem;pointer-events:none}
.sw{position:relative}
.sw select{padding-right:38px}

/* Strength Meter */
.str{display:flex;gap:4px;margin-top:6px}
.sg{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.05);transition:background .4s,box-shadow .4s}
.err{font-size:.65rem;color:#f87171;padding-left:4px;margin-top:4px;display:none;animation:fi .2s ease}

/* MAGNETIC BUTTON */
.btn-wrap{position:relative;margin-top:20px;z-index:10}
.btn{position:relative;width:100%;height:52px;border:none;border-radius:12px;background:linear-gradient(135deg,#0284c7,#06b6d4,#3b82f6);font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.15em;color:#fff;cursor:pointer;overflow:hidden;transition:transform .1s,box-shadow .3s;box-shadow:0 8px 30px rgba(6,182,212,.3),0 0 0 1px rgba(255,255,255,.2);will-change:transform}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent)}
.btxt{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:10px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.btn:hover{box-shadow:0 15px 40px rgba(6,182,212,.5),0 0 0 1px rgba(255,255,255,.4)}
.btn:active{transform:scale(0.96)}

.lr{text-align:center;margin-top:20px;font-size:.85rem;color:var(--muted);font-weight:300;position:relative;z-index:10}
.lr a{color:var(--cyan);font-weight:700;text-decoration:none;position:relative;padding:8px 4px}
.lr a::after{content:'';position:absolute;bottom:4px;left:0;right:0;height:2px;background:var(--cyan);transform:scaleX(0);transform-origin:right;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.lr a:hover::after{transform:scaleX(1);transform-origin:left}

/* =========================================
   MOBILE RESPONSIVENESS & ANIMATIONS 📱
   ========================================= */
@media (max-width: 768px) {
  #cur, #cur-ring { display: none !important; }
  body { cursor: auto; }
  .layout{padding:20px 15px}
  .card { padding: 32px 20px 24px; border-radius: 20px; margin-bottom: 20px; }
  .ftitle { font-size: 1.9rem; margin-bottom: 4px; }
  .fsub { font-size: 0.8rem; margin-bottom: 20px; }
  
  /* Prevent iOS Zoom */
  input, select { font-size: 16px !important; }
  
  /* Staggered Mobile Entry Animation */
  .f, .btn-wrap, .lr { opacity: 0; animation: mobilePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  .f:nth-child(1) { animation-delay: 0.4s; }
  .f:nth-child(2) { animation-delay: 0.5s; }
  .f:nth-child(3) { animation-delay: 0.6s; }
  .f:nth-child(4) { animation-delay: 0.7s; }
  .f:nth-child(5) { animation-delay: 0.8s; }
  .f:nth-child(6) { animation-delay: 0.9s; }
  .btn-wrap { animation-delay: 1.0s; }
  .lr { animation-delay: 1.1s; }
}

@keyframes mobilePop {
  0% { opacity: 0; transform: translateY(15px) scale(0.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="grain"></div>
<div id="cur"></div>
<div id="cur-ring"></div>

<div class="layout">
  <div class="card" id="card">
    <div class="glare" id="glare"></div>

    <div class="flogo">
      <div class="gem"><i class="fa-solid fa-graduation-cap"></i></div>
      <div><div class="lname">RENANCE CBT</div><span class="ltag">learning never ends</span></div>
    </div>
    
    <div class="ftitle" id="glitch-text" data-value="CREATE ACCOUNT">CREATE ACCOUNT</div>
    <div class="fsub">Join the FUTA CBT simulation platform.</div>

    <form id="sf" novalidate>
      <div class="f">
        <label class="fl">Full Name</label>
        <div class="iw"><i class="fa-solid fa-user ic"></i><input type="text" id="fullname" placeholder="Bamidele Joseph" required></div>
        <div class="err" id="e-name">Enter your full name</div>
      </div>

      <div class="f">
        <label class="fl">Email Address</label>
        <div class="iw"><i class="fa-solid fa-envelope ic"></i><input type="email" id="email" placeholder="student@futa.edu.ng" required></div>
        <div class="err" id="e-email">Enter a valid email</div>
      </div>

      <div class="f">
        <label class="fl">Password</label>
        <div class="iw">
          <i class="fa-solid fa-lock ic"></i>
          <input type="password" id="password" placeholder="Min 8 characters" required>
          <i class="fa-solid fa-eye ic icr" id="togPw"></i>
        </div>
        <div class="str"><div class="sg" id="s1"></div><div class="sg" id="s2"></div><div class="sg" id="s3"></div><div class="sg" id="s4"></div></div>
        <div class="err" id="e-pw">Minimum 8 characters</div>
      </div>

      <div class="f">
        <label class="fl">Phone Number</label>
        <div class="pr">
          <div class="cw"><select id="code" tabindex="-1"><option value="+234">+234 🇳🇬</option></select></div>
          <div class="iw" style="flex:1"><i class="fa-solid fa-mobile-screen-button ic" style="left:10px"></i><input type="tel" id="phone" placeholder="08012345678" style="padding-left:32px"></div>
        </div>
        <div class="err" id="e-phone">Enter a valid number</div>
      </div>

      <div class="f">
        <label class="fl">Faculty / School</label>
        <div class="sw">
          <select id="faculty" required>
            <option value="" disabled selected>Select your faculty</option>
            <option value="SOC">School of Computing (SOC)</option>
            <option value="SLIT">School of Logistics & Innovation Tech (SLIT)</option>
            <option value="SPS">School of Physical Sciences (SPS)</option>
            <option value="SESE">School of Electrical Systems Eng (SESE)</option>
            <option value="SIMME">School of Infrastructure & Mfg Eng (SIMME)</option>
            <option value="SET">School of Environmental Technology (SET)</option>
            <option value="SAAT">School of Agriculture & Agric Tech (SAAT)</option>
            <option value="SEMS">School of Earth & Mineral Sciences (SEMS)</option>
            <option value="SLS">School of Life Sciences (SLS)</option>
            <option value="CHS">College of Health Sciences (CHS)</option>
            <option value="GNS">General Studies (GNS)</option>
          </select>
        </div>
        <div class="err" id="e-fac">Select your faculty</div>
      </div>

      <div class="f">
        <label class="fl">Department</label>
        <div class="sw"><select id="dept" required><option value="" disabled selected>Select faculty first</option></select></div>
        <div class="err" id="e-dept">Select your department</div>
      </div>

      <div class="btn-wrap" id="btnWrap">
        <button type="submit" class="btn" id="subBtn">
          <span class="btxt"><i class="fa-solid fa-user-plus"></i> REGISTER</span>
        </button>
      </div>
    </form>

    <div class="lr">Already have an account? <a href="login.html">Sign in here</a></div>
  </div>
</div>

<script>
/* ── CANVAS: THE GRAVITY WELL (BLACK HOLE) ── */
const cv=document.getElementById('c'), ct=cv.getContext('2d');
let W,H;
function rs(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
rs();window.addEventListener('resize',rs);

let particles=[];
let mx=W/2, my=H/2; 
let cx=W/2, cy=H/2; 

for(let i=0;i<200;i++){
  particles.push({
    angle: Math.random()*Math.PI*2,
    radius: Math.random()*Math.max(W,H),
    speed: (Math.random()*0.02)+0.005,
    size: Math.random()*2.5,
    color: Math.random()>0.5 ? '#06b6d4' : '#3b82f6',
    alpha: Math.random()
  });
}

function updateTarget(x, y) { mx = x; my = y; }
window.addEventListener('mousemove', e => updateTarget(e.clientX, e.clientY));
window.addEventListener('touchmove', e => updateTarget(e.touches[0].clientX, e.touches[0].clientY), {passive: true});

function triggerShockwave() {
  particles.forEach(p=>{ p.radius += 100 + Math.random()*120; p.speed *= 3; });
}
window.addEventListener('mousedown', triggerShockwave);
window.addEventListener('touchstart', triggerShockwave, {passive: true});

function drawGalaxy(){
  ct.fillStyle='rgba(3,7,18,0.2)'; 
  ct.fillRect(0,0,W,H);

  cx += (mx - cx) * 0.05;
  cy += (my - cy) * 0.05;

  particles.forEach(p=>{
    p.angle += p.speed;
    if(p.radius > 50) p.radius -= 0.5;
    if(p.speed > 0.02) p.speed *= 0.98;

    let x = cx + Math.cos(p.angle) * p.radius;
    let y = cy + Math.sin(p.angle) * p.radius;

    ct.beginPath();
    ct.arc(x,y,p.size,0,Math.PI*2);
    ct.fillStyle = p.color;
    ct.globalAlpha = p.alpha;
    ct.fill();
    
    if(p.radius < 150){
       ct.beginPath(); ct.moveTo(cx,cy); ct.lineTo(x,y);
       ct.strokeStyle=p.color; ct.globalAlpha=p.alpha*0.15; ct.lineWidth=0.5; ct.stroke();
    }
  });
  ct.globalAlpha = 1;
  requestAnimationFrame(drawGalaxy);
}
drawGalaxy();

/* ── HACKER TEXT DECRYPTION EFFECT ── */
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
const glitchEl = document.getElementById('glitch-text');
const originalText = glitchEl.dataset.value;

window.addEventListener('load', () => {
  let iterations = 0;
  const interval = setInterval(() => {
    glitchEl.innerText = originalText.split("").map((letter, index) => {
      if(index < iterations) return originalText[index];
      return letters[Math.floor(Math.random() * letters.length)];
    }).join("");
    if(iterations >= originalText.length) clearInterval(interval);
    iterations += 1/3;
  }, 30);
});

/* ── CUSTOM CURSOR (Desktop only) ── */
const cur=document.getElementById('cur'), ring=document.getElementById('cur-ring');
let rx=0,ry=0;
window.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
});
(function animateRing(){
  rx+=(mx-rx)*0.15; ry+=(my-ry)*0.15;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animateRing);
})();
document.querySelectorAll('input,select,button,a,.icr').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    ring.style.width='50px'; ring.style.height='50px'; 
    ring.style.background='rgba(6,182,212,0.1)';
  });
  el.addEventListener('mouseleave',()=>{
    ring.style.width='36px'; ring.style.height='36px'; 
    ring.style.background='transparent';
  });
});

/* ── 3D TILT & GLARE EFFECT ── */
const card=document.getElementById('card'), glare=document.getElementById('glare');

card.addEventListener('mousemove',e=>{
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left; const y = e.clientY - rect.top;
  const cx = rect.width/2; const cy = rect.height/2;
  const rotateX = ((y - cy) / cy) * -5; // Reduced max tilt for taller form
  const rotateY = ((x - cx) / cx) * 5;
  
  card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  glare.style.setProperty('--mx', (x/rect.width*100)+'%');
  glare.style.setProperty('--my', (y/rect.height*100)+'%');
});
card.addEventListener('mouseleave',()=>{
  card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
  card.style.transition = 'transform 0.5s ease';
  setTimeout(()=>card.style.transition='', 500);
});

if (window.DeviceOrientationEvent && matchMedia('(pointer:coarse)').matches) {
  window.addEventListener('deviceorientation', function(e) {
    let tiltX = Math.min(Math.max(e.beta - 45, -10), 10); 
    let tiltY = Math.min(Math.max(e.gamma, -10), 10);
    card.style.transform = `perspective(1000px) rotateX(${-tiltX}deg) rotateY(${tiltY}deg)`;
    glare.style.setProperty('--mx', (50 + tiltY*2) + '%');
    glare.style.setProperty('--my', (50 + tiltX*2) + '%');
  });
}

/* ── MAGNETIC BUTTON (Desktop Only) ── */
const btnWrap = document.getElementById('btnWrap'), btn = document.getElementById('subBtn');
if(matchMedia('(pointer:fine)').matches) {
  btnWrap.addEventListener('mousemove', (e) => {
    const rect = btnWrap.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width/2;
    const y = e.clientY - rect.top - rect.height/2;
    btn.style.transform = `translate(${x * 0.3}px, ${y * 0.4}px)`;
  });
  btnWrap.addEventListener('mouseleave', () => {
    btn.style.transform = 'translate(0px, 0px)';
  });
}

/* ── PASSWORD TOGGLE & METER ── */
document.getElementById('togPw').addEventListener('click',function(e){
  e.preventDefault(); 
  const p=document.getElementById('password'),t=p.type==='text';
  p.type=t?'password':'text';
  this.classList.toggle('fa-eye',t); this.classList.toggle('fa-eye-slash',!t);
});

document.getElementById('password').addEventListener('input',function(){
  const v=this.value;let s=0;
  if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  const c=['#ef4444','#f59e0b','#10b981','#3b82f6'],g=['rgba(239,68,68,.4)','rgba(245,158,11,.4)','rgba(16,185,129,.4)','rgba(59,130,246,.4)'];
  [1,2,3,4].forEach(i=>{
    const sg=document.getElementById('s'+i);
    if(i<=s){sg.style.background=c[s-1];sg.style.boxShadow=`0 0 6px ${g[s-1]}`}
    else{sg.style.background='rgba(255,255,255,.05)';sg.style.boxShadow='none'}
  });
});

/* ── FACULTY & DEPARTMENTS LOGIC ── */
const depts={SOC:['Software Engineering (SEN)','Computer Science (CSC)','Cybersecurity (CYS)','Data Science (DSC)','Information Systems (IFS)','Information Technology (IFT)'],SLIT:['Financial Technology (FinTech)','Business Information Technology (BIT)','Entrepreneurship Management Technology (EMT)','Logistics and Transport Technology (LTT)','Maritime Technology and Logistics (MTL)','Project Management Technology (PMT)','Securities and Investment Management Technology (SIMT)','Supply Chain Management (SCM)'],SPS:['Educational Technology (EDT)','Library and Information Science (LIS)','Physics (PHY)','Mathematics (MTH)','Chemistry (CHE)','Statistics (STA)'],SESE:['Computer Engineering (CPE)','Electrical and Electronics Engineering (EEE)','Information and Communication Engineering (ICE)','Mechatronics Engineering (MCE)','Biomedical Engineering (BME)'],SIMME:['Mechanical Engineering (MEE)','Civil and Environmental Engineering (CVE)','Agricultural Engineering (AGE)','Chemical Engineering (CHE)','Industrial and Production Engineering (IPE)','Metallurgical and Materials Engineering (MME)','Mining Engineering (MNE)'],SET:['Architecture (ARC)','Building (BDG)','Environmental Management (EVM)','Estate Management (ESM)','Industrial Design (IDD)','Quantity Surveying (QSV)','Surveying and Geoinformatics (SVG)','Urban and Regional Planning (URP)'],SAAT:['Agricultural and Resource Economics (ARE)','Agricultural Extension and Communication Technology (AEC)','Animal Production and Health (APH)','Crop, Soil and Pest Management (CSP)','Ecotourism and Wildlife Management (EWM)','Fisheries and Aquaculture Technology (FAT)','Food Science and Technology (FST)','Forestry and Wood Technology (FWT)','Nutrition and Dietetics (NUD)'],SEMS:['Applied Geology (AGY)','Applied Geophysics (AGP)','Marine Science and Technology (MST)','Meteorology and Climate Science (MET)','Remote Sensing and Geoscience Information Systems (RSG)'],SLS:['Biochemistry (BCH)','Biology (BIO)','Biotechnology (BTH)','Microbiology (MCB)'],CHS:['Medicine and Surgery (MBBS)','Nursing Science (NSC)','Human Anatomy (ANA)','Physiology (PHS)','Medical Laboratory Science (MLS)','Public Health (PUH)'],GNS:['General Studies (GNS)']};
document.getElementById('faculty').addEventListener('change',function(){
  const s=document.getElementById('dept');
  s.innerHTML='<option value="" disabled selected>Select department</option>';
  (depts[this.value]||[]).forEach(d=>{const o=document.createElement('option');o.value=o.textContent=d;s.appendChild(o)});
