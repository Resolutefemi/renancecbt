<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="rust.css">
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <title>Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .custom-select {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            appearance: none;
        }
        .custom-select option {
            color: black; 
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="signupForm">
            <h1>Signup</h1>

            <div class="input-box">
                <input type="text" name="fullname" id="fullname" placeholder="Full Name" required>
                <i class="fa-solid fa-user-tag"></i>
            </div>

            <div class="input-box">
                <input type="password" name="password" id="password" placeholder="Password" required/>
                <i class="fa-solid fa-eye" id="togglePassword" style="cursor: pointer;"></i>
            </div>

            <div class="input-box" style="display: flex; align-items: center; border: 2px solid rgba(255, 255, 255, .2); border-radius: 40px; padding: 0 20px; background: transparent;">
                <select name="countryCode" id="countryCode" style="background: transparent; color: #fff; border: none; outline: none; font-size: 16px; cursor: pointer;">
                    <option value="+234" style="color: black;">+234 (NG)</option>
                    <option value="+233" style="color: black;">+233 (GH)</option>
                    <option value="+1" style="color: black;">+1 (US)</option>
                </select>
                <span style="color: rgba(255, 255, 255, .3); margin: 0 10px;">|</span>
                <input type="tel" name="phone" id="phone" placeholder="Phone No." required 
                       style="background: transparent; border: none; outline: none; color: #fff; width: 100%; height: 50px; font-size: 16px;">
                <i class="fa-solid fa-mobile-screen-button"></i>
            </div>

            <div class="input-box">
                <input type="email" name="email" id="email" placeholder="Email" required>
                <i class="fa-solid fa-paper-plane"></i>
            </div>

            <div class="input-box">
                <select name="faculty" id="faculty" class="custom-select" required>
                    <option value="" disabled selected>Select Faculty/School</option>
                    <option value="SOC">School of Computing (SOC)</option>
                    <option value="SLIT">School of Logistics and Innovation Technology (SLIT)</option>
                    <option value="SPS">School of Physical Sciences (SPS)</option>
                    <option value="SESE">School of Electrical Systems Engineering (SESE)</option>
                    <option value="SIMME">School of Infrastructure, Minerals & Mfg Eng (SIMME)</option>
                    <option value="SET">School of Environmental Technology (SET)</option>
                    <option value="SAAT">School of Agriculture and Agricultural Technology (SAAT)</option>
                    <option value="SEMS">School of Earth and Mineral Sciences (SEMS)</option>
                    <option value="SLS">School of Life Sciences (SLS)</option>
                    <option value="CHS">College of Health Sciences (CHS)</option>
                    <option value="GNS">General Studies (GNS)</option>
                </select>
                <i class="fa-solid fa-building-columns"></i>
            </div>

            <div class="input-box">
                <select name="department" id="department" class="custom-select" required>
                    <option value="" disabled selected>Select Department First</option>
                </select>
                <i class="fa-solid fa-building"></i>
            </div>

            <button type="submit" class="btn" id="submitBtn">Register</button>

            <div class="register-link">
                <p>Already have an account? <a href="login.html"><strong>Login</strong></a></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    // 1. INITIALIZE SUPABASE
    const SUPABASE_URL = 'https://ubxsywaxdvkhiqepcvmq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVieHN5d2F4ZHZraGlxZXBjdm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5ODcwMDAsImV4cCI6MjA4NzU2MzAwMH0.gkR3Aud3LRLNyNwpDHJTT0vIrWCnQkSBkFSaFjQ5qy4';
    if (!window._sb) window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const db = window._sb;

    // 2. PASSWORD TOGGLE
    document.getElementById('togglePassword').addEventListener('click', function () {
        const pass = document.getElementById('password');
        if (pass.type === 'password') {
            pass.type = 'text';
            this.classList.remove('fa-eye');
            this.classList.add('fa-eye-slash');
        } else {
            pass.type = 'password';
            this.classList.remove('fa-eye-slash');
            this.classList.add('fa-eye');
        }
    });

    // 3. FACULTY TO DEPARTMENT MAPPING LOGIC 
    const futaDepartments = {
        "SOC": [
            "Software Engineering (SEN)", "Computer Science (CSC)", "Cybersecurity (CYS)", 
            "Data Science (DSC)", "Information Systems (IFS)", "Information Technology (IFT)"
        ],
        "SLIT": [
            "Financial Technology (FinTech)", "Business Information Technology (BIT)", 
            "Entrepreneurship Management Technology (EMT)", "Logistics and Transport Technology (LTT)", 
            "Maritime Technology and Logistics (MTL)", "Project Management Technology (PMT)", 
            "Securities and Investment Management Technology (SIMT)", "Supply Chain Management (SCM)"
        ],
        "SPS": [
            "Educational Technology (EDT)", "Library and Information Science (LIS)", 
            "Physics (PHY)", "Mathematics (MTH)", "Chemistry (CHE)", "Statistics (STA)"
        ],
        "SESE": [
            "Computer Engineering (CPE)", "Electrical and Electronics Engineering (EEE)", 
            "Information and Communication Engineering (ICE)", "Mechatronics Engineering (MCE)", 
            "Biomedical Engineering (BME)"
        ],
        "SIMME": [
            "Mechanical Engineering (MEE)", "Civil and Environmental Engineering (CVE)", 
            "Agricultural Engineering (AGE)", "Chemical Engineering (CHE)", 
            "Industrial and Production Engineering (IPE)", "Metallurgical and Materials Engineering (MME)", 
            "Mining Engineering (MNE)"
        ],
        "SET": [
            "Architecture (ARC)", "Building (BDG)", "Environmental Management (EVM)", 
            "Estate Management (ESM)", "Industrial Design (IDD)", "Quantity Surveying (QSV)", 
            "Surveying and Geoinformatics (SVG)", "Urban and Regional Planning (URP)"
        ],
        "SAAT": [
            "Agricultural and Resource Economics (ARE)", "Agricultural Extension and Communication Technology (AEC)", 
            "Animal Production and Health (APH)", "Crop, Soil and Pest Management (CSP)", 
            "Ecotourism and Wildlife Management (EWM)", "Fisheries and Aquaculture Technology (FAT)", 
            "Food Science and Technology (FST)", "Forestry and Wood Technology (FWT)", "Nutrition and Dietetics (NUD)"
        ],
        "SEMS": [
            "Applied Geology (AGY)", "Applied Geophysics (AGP)", "Marine Science and Technology (MST)", 
            "Meteorology and Climate Science (MET)", "Remote Sensing and Geoscience Information Systems (RSG)"
        ],
        "SLS": [
            "Biochemistry (BCH)", "Biology (BIO)", "Biotechnology (BTH)", "Microbiology (MCB)"
        ],
        "CHS": [
            "Medicine and Surgery (MBBS)", "Nursing Science (NSC)", "Human Anatomy (ANA)", 
            "Physiology (PHS)", "Medical Laboratory Science (MLS)", "Public Health (PHS)"
        ],
        "GNS": [
            "General Studies (GNS)"
        ]
    };

    const facultySelect = document.getElementById('faculty');
    const departmentSelect = document.getElementById('department');

    facultySelect.addEventListener('change', function() {
        // Clear existing options
        departmentSelect.innerHTML = '<option value="" disabled selected>Select Department</option>';
        
        const selectedFaculty = this.value;
        const departments = futaDepartments[selectedFaculty] || [];
        
        // Populate new options
        departments.forEach(dept => {
            const option = document.createElement('option');
            option.value = dept;
            option.textContent = dept;
            departmentSelect.appendChild(option);
        });
    });

    // 4. SIGNUP FORM LOGIC
    document.getElementById('signupForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "Processing... ⏳";
        submitBtn.disabled = true;

        const fullname    = document.getElementById('fullname').value.trim();
        const password    = document.getElementById('password').value;
        const email       = document.getElementById('email').value.trim();
        const faculty     = document.getElementById('faculty').value;
        const department  = document.getElementById('department').value;
        const countryCode = document.getElementById('countryCode').value;
        const phone       = countryCode + document.getElementById('phone').value.trim();

        try {
            // STEP 1: CREATE AUTH USER
            const { data: authData, error: authError } = await db.auth.signUp({
                email: email,
                password: password,
            });

            if (authError) throw authError;

            // STEP 2: INSERT STUDENT DETAILS
            const userId = authData.user ? authData.user.id : null;

            if (userId) {
                const { error: dbError } = await db
                    .from('students')
                    .insert([{
                        id: userId,
                        fullname: fullname,
                        email: email,
                        faculty: faculty, 
                        department: department,
                        phone: phone
                    }]);

                if (dbError) throw dbError;
            }

            alert('Registration Successful! 🎉');
            window.location.href = 'login.html';

        } catch (err) {
            console.error("Signup Error:", err);
            alert('Signup Failed ❌\n\n' + (err.message || "Unknown error. Check console."));
            submitBtn.innerText = "Register";
            submitBtn.disabled = false;
        }
    });
    </script>
</body>
</html>
